name: Pull Idaho Crime Clarity Data

on:
  schedule:
    # Runs at 09:00 UTC on the 3rd of every month (agencies typically finish
    # submitting the prior month's NIBRS data by early the following month)
    - cron: "0 9 3 * *"
  workflow_dispatch: {}  # allows manual trigger from GitHub's Actions tab

jobs:
  pull-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Pull current year-to-date data
        run: python pull_idaho_data.py --out data/idaho_race_ethnicity.json

      - name: Commit updated data if changed
        run: |
          git config user.name "crime-clarity-bot"
          git config user.email "bot@idahofidelityfoundation.org"
          git add data/idaho_race_ethnicity.json
          git diff --staged --quiet || git commit -m "Automated data pull: $(date -u +%Y-%m-%d)"
          git push
